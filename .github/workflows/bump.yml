name: Bump to coree version

on:
  workflow_dispatch:
    inputs:
      coree_version:
        description: 'coree version (e.g. 0.14.0)'
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx release-it ${{ inputs.coree_version }}-1 --ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
